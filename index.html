<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple E-Commerce</title>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>

  <header>
    <h1>My Shop 🛒</h1>
    <div class="cart">
      Cart: <span id="cart-count">0</span>
    </div>
  </header>

  <section class="products">

    <div class="product">
      <h3>Headphones</h3>
      <p>₹1200</p>
      <button onclick="addToCart('Headphones', 1200)">Add to Cart</button>
    </div>

    <div class="product">
      <h3>Smart Watch</h3>
      <p>₹2500</p>
      <button onclick="addToCart('Smart Watch', 2500)">Add to Cart</button>
    </div>

    <div class="product">
      <h3>Mobile Phone</h3>
      <p>₹15000</p>
      <button onclick="addToCart('Mobile Phone', 15000)">Add to Cart</button>
    </div>

  </section>

  <section class="cart-box">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
  </section>

  <script src="index.js"></script>
</body>
</html>
